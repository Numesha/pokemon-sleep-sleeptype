  <style>
:root{--bg:#f7f2e8;--paper:#fffdf8;--ink:#20242a;--muted:#686f77;--line:#ddd3c1;--accent:#287f7a;--gold:#d39524;--rose:#b84f63;--blue:#5177b8;--green:#5b8d53;--shadow:0 12px 30px rgba(32,36,42,.09)}*{box-sizing:border-box}html{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}body{margin:0;min-width:320px}button,input,select,textarea{font:inherit}button,.file-button{border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:8px;padding:10px 13px;min-height:42px;cursor:pointer}.primary{background:var(--accent);border-color:var(--accent);color:white}.danger{color:#9f2639;border-color:#e3b7bf}.app-shell{width:min(1180px,100%);margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 14px max(26px,env(safe-area-inset-bottom))}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:12px 0 16px}h1,h2,h3,p{margin:0}h1{font-size:clamp(25px,4vw,40px);line-height:1.1}h2{font-size:22px}h3{font-size:18px;margin-bottom:12px}.topbar p,.section-head p,.dialog-head p,#analysisSummary,#statsSummary{color:var(--muted);margin-top:6px;line-height:1.5}.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.file-button{display:inline-grid;place-items:center;position:relative;overflow:hidden}.file-button input{position:absolute;inset:0;opacity:0}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;position:sticky;top:0;z-index:5;background:rgba(247,242,232,.94);backdrop-filter:blur(10px);padding:8px 0 12px}.tab{padding:9px 6px;min-height:38px;color:var(--muted)}.tab.active{background:var(--ink);border-color:var(--ink);color:white}.view{display:none}.view.active{display:block}.panel,.score-card,.stat-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.panel{padding:14px}.month-nav{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:10px;margin-bottom:12px}.month-nav h2{text-align:center}.weekday-row,.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}.weekday-row{color:var(--muted);font-size:12px;text-align:center;margin-bottom:6px}.day-cell{min-height:78px;padding:8px 6px;display:flex;flex-direction:column;align-items:flex-start;gap:5px;border-radius:8px;border:1px solid #e5dccd;background:#fffaf0}.day-cell.outside{opacity:.45}.day-cell.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}.date-num{font-weight:700}.badges{display:flex;gap:4px;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;min-height:20px;padding:2px 6px;border-radius:999px;color:white;font-size:11px;line-height:1}.type-dozing{background:var(--rose)}.type-snoozing{background:var(--blue)}.type-slumbering{background:var(--green)}.type-balanced{background:var(--gold)}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:10px 0 14px}.section-head input{width:min(360px,48vw)}input,select,textarea{width:100%;border:1px solid var(--line);background:white;border-radius:8px;min-height:42px;padding:9px 10px;color:var(--ink)}textarea{resize:vertical;line-height:1.45}.list{display:grid;gap:10px}.history-item{display:grid;grid-template-columns:minmax(94px,130px) 1fr auto;gap:12px;align-items:center;padding:12px;background:var(--paper);border:1px solid var(--line);border-radius:8px}.history-item strong{display:block;margin-bottom:5px}.history-meta{color:var(--muted);font-size:13px}.score-grid,.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px}.score-card,.stat-card{padding:14px}.score-card strong,.stat-card strong{display:block;font-size:26px;margin:7px 0}.score-card small{color:var(--muted);line-height:1.45}.bar{height:8px;background:#ece2d3;border-radius:999px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:var(--accent)}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;min-width:760px;background:white}th,td{border-bottom:1px solid #eee5d8;padding:10px;text-align:left;vertical-align:top;font-size:14px}th{position:sticky;top:0;background:#f6ead7;z-index:1}tr:last-child td{border-bottom:0}.match{color:#1f7b43;font-weight:700}.miss{color:#a23b4c;font-weight:700}dialog{width:min(920px,calc(100vw - 20px));max-height:min(92vh,900px);border:1px solid var(--line);border-radius:8px;padding:0;background:var(--paper);box-shadow:0 20px 70px rgba(0,0,0,.25)}dialog::backdrop{background:rgba(25,23,20,.4)}#entryForm{padding:14px}.dialog-head,.dialog-actions{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.dialog-actions{grid-template-columns:auto 1fr auto auto;margin-top:14px;align-items:center}.icon-button{width:42px;padding:0;font-size:24px;line-height:1}.split-control{margin:14px 0;max-width:220px}label span,.split-control span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.sleep-forms{display:grid;gap:12px}.sleep-card{border:1px solid var(--line);border-radius:8px;padding:12px;margin:0;background:#fffaf2}.sleep-card legend{font-weight:700;padding:0 6px}.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.memo-label{display:block;margin-top:10px}.empty{padding:18px;text-align:center;color:var(--muted);background:var(--paper);border:1px dashed var(--line);border-radius:8px}@media(max-width:760px){.app-shell{padding-left:10px;padding-right:10px}.topbar{display:block}.top-actions{justify-content:stretch;margin-top:12px}.top-actions button,.file-button{flex:1}.tabs{grid-template-columns:repeat(5,minmax(60px,1fr));overflow-x:auto}.tab{font-size:13px;white-space:nowrap}.day-cell{min-height:62px;padding:6px 4px}.badge{font-size:10px;padding-inline:5px}.section-head{display:block}.section-head input{width:100%;margin-top:10px}.history-item{grid-template-columns:1fr}.history-item button{width:100%}.form-grid{grid-template-columns:1fr 1fr}.dialog-actions{grid-template-columns:1fr 1fr}.dialog-actions span{display:none}}@media(max-width:430px){.calendar-grid,.weekday-row{gap:4px}.day-cell{min-height:58px}.date-num{font-size:13px}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div><h1>睡眠タイプ計測ツール</h1><p>複数の仮説モデルで、実際の判定との一致率を検証します。</p></div>
      <div class="top-actions"><button id="backupBtn" type="button">JSON保存</button><label class="file-button">JSON復元<input id="restoreInput" type="file" accept="application/json"></label></div>
    </header>
    <nav class="tabs"><button class="tab active" data-view="calendar">カレンダー</button><button class="tab" data-view="history">履歴</button><button class="tab" data-view="analysis">解析</button><button class="tab" data-view="neutral">とくちょうなし</button><button class="tab" data-view="stats">統計</button></nav>
    <main>
      <section id="calendarView" class="view active"><div class="panel"><div class="month-nav"><button id="prevMonth" type="button">‹</button><h2 id="monthLabel"></h2><button id="nextMonth" type="button">›</button></div><div class="weekday-row"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div><div id="calendarGrid" class="calendar-grid"></div></div></section>
      <section id="historyView" class="view"><div class="section-head"><h2>履歴一覧</h2><input id="historySearch" type="search" placeholder="日付・メモで検索"></div><div id="historyList" class="list"></div></section>
      <section id="analysisView" class="view"><div class="section-head"><h2>モデル一致率</h2><p id="analysisSummary"></p></div><div id="modelScoreGrid" class="score-grid"></div><div class="panel"><h3>睡眠ごとの予測比較</h3><div id="predictionTable" class="table-wrap"></div></div></section>
      <section id="neutralView" class="view"><div class="section-head"><h2>とくちょうなし解析</h2><p>平均との差や分割睡眠など、候補条件を並べて観察します。</p></div><div id="neutralHypotheses" class="score-grid"></div><div class="panel"><h3>とくちょうなし発生日</h3><div id="neutralTable" class="table-wrap"></div></div></section>
      <section id="statsView" class="view"><div class="section-head"><h2>統計</h2><p id="statsSummary"></p></div><div id="statsGrid" class="stats-grid"></div></section>
    </main>
  </div>
  <dialog id="entryDialog"><form id="entryForm" method="dialog"><div class="dialog-head"><div><h2 id="entryDateLabel"></h2><p>1日最大2回まで入力できます。</p></div><button class="icon-button" value="cancel" type="submit">×</button></div><div class="split-control"><label><span>2回目</span><select id="secondMode"><option value="off">計測なし</option><option value="on">計測あり</option></select></label></div><div id="sleepForms" class="sleep-forms"></div><div class="dialog-actions"><button id="deleteDayBtn" type="button" class="danger">この日を削除</button><span></span><button value="cancel" type="submit">閉じる</button><button id="saveDayBtn" type="button" class="primary">保存</button></div></form></dialog>
  <template id="sleepFormTemplate"><fieldset class="sleep-card"><legend></legend><div class="form-grid"><label><span>睡眠タイプ</span><select data-field="type"><option value="">未入力</option><option value="dozing">うとうと</option><option value="snoozing">すやすや</option><option value="slumbering">ぐっすり</option><option value="balanced">とくちょうなし</option></select></label><label><span>うとうと%</span><input data-field="dozing" type="number" min="0" max="100" step="1" inputmode="numeric"></label><label><span>すやすや%</span><input data-field="snoozing" type="number" min="0" max="100" step="1" inputmode="numeric"></label><label><span>ぐっすり%</span><input data-field="slumbering" type="number" min="0" max="100" step="1" inputmode="numeric"></label><label><span>睡眠時間</span><input data-field="duration" type="time" step="60"></label><label><span>睡眠スコア</span><input data-field="score" type="number" min="0" max="100" step="1" inputmode="numeric"></label><label><span>寝付くまで</span><select data-field="sleepLatency"><option value="">未入力</option></select></label><label><span>就寝時刻</span><input data-field="bedTime" type="time"></label><label><span>起床時刻</span><input data-field="wakeTime" type="time"></label></div><label class="memo-label"><span>メモ</span><textarea data-field="memo" rows="3" placeholder="分割睡眠、計測の違和感、イベントなど"></textarea></label></fieldset></template>
  <script>
(function(){
'use strict';
var STORAGE_KEY='pokemon-sleep-type-measurement-tool-v1';
var TYPE_KEYS=['dozing','snoozing','slumbering'];
var TYPE_LABELS={dozing:'うとうと',snoozing:'すやすや',slumbering:'ぐっすり',balanced:'とくちょうなし'};
var MODEL_WINDOWS=[7,14,21,30,60,'all'];
var WEIGHTS=[['simple','単純平均'],['duration','睡眠時間加重'],['score','睡眠スコア加重'],['recency','最近ほど重く']];
var SPLITS=[['session','睡眠単位'],['first','1回目のみ'],['second','2回目のみ'],['daily','1日合算']];
var state={currentMonth:startOfMonth(new Date()),selectedDate:toDateKey(new Date()),data:loadData()};
var els={};
document.addEventListener('DOMContentLoaded',init);
function init(){['calendarGrid','monthLabel','prevMonth','nextMonth','entryDialog','entryDateLabel','sleepForms','sleepFormTemplate','secondMode','saveDayBtn','deleteDayBtn','historyList','historySearch','analysisSummary','modelScoreGrid','predictionTable','neutralHypotheses','neutralTable','statsSummary','statsGrid','backupBtn','restoreInput'].forEach(function(id){els[id]=document.getElementById(id);});els.tabs=Array.prototype.slice.call(document.querySelectorAll('.tab'));els.views=Array.prototype.slice.call(document.querySelectorAll('.view'));buildLatencyOptions();bindEvents();renderAll();}
function bindEvents(){els.prevMonth.addEventListener('click',function(){changeMonth(-1);});els.nextMonth.addEventListener('click',function(){changeMonth(1);});els.secondMode.addEventListener('change',renderEntryForm);els.saveDayBtn.addEventListener('click',saveEntryFromDialog);els.deleteDayBtn.addEventListener('click',deleteSelectedDay);els.historySearch.addEventListener('input',renderHistory);els.backupBtn.addEventListener('click',downloadBackup);els.restoreInput.addEventListener('change',restoreBackup);els.tabs.forEach(function(tab){tab.addEventListener('click',function(){var view=tab.dataset.view;els.tabs.forEach(function(t){t.classList.toggle('active',t===tab);});els.views.forEach(function(section){section.classList.toggle('active',section.id===view+'View');});renderAll();});});}
function renderAll(){renderCalendar();renderHistory();renderAnalysis();renderNeutral();renderStats();}
function renderCalendar(){var month=state.currentMonth;els.monthLabel.textContent=month.getFullYear()+'年 '+(month.getMonth()+1)+'月';els.calendarGrid.replaceChildren();var first=startOfMonth(month);var start=addDays(first,-first.getDay());var todayKey=toDateKey(new Date());for(var i=0;i<42;i++){var day=addDays(start,i);var key=toDateKey(day);var button=document.createElement('button');button.type='button';button.className='day-cell';button.classList.toggle('outside',day.getMonth()!==month.getMonth());button.classList.toggle('today',key===todayKey);button.addEventListener('click',openEntryDialog.bind(null,key));var num=document.createElement('span');num.className='date-num';num.textContent=String(day.getDate());button.append(num);var badges=document.createElement('span');badges.className='badges';getDaySessions(key).forEach(function(session,index){if(!session.type)return;var badge=document.createElement('span');badge.className='badge type-'+session.type;badge.textContent=(index+1)+' '+TYPE_LABELS[session.type];badges.append(badge);});button.append(badges);els.calendarGrid.append(button);}}
function openEntryDialog(dateKey){state.selectedDate=dateKey;els.entryDateLabel.textContent=formatDateLabel(dateKey);var record=state.data.records[dateKey]||createEmptyRecord();els.secondMode.value=record.secondEnabled?'on':'off';renderEntryForm();if(typeof els.entryDialog.showModal==='function')els.entryDialog.showModal();else els.entryDialog.setAttribute('open','open');}
function renderEntryForm(){var record=normalizeRecord(state.data.records[state.selectedDate]||createEmptyRecord());var count=els.secondMode.value==='on'?2:1;els.sleepForms.replaceChildren();for(var index=0;index<count;index++){var fragment=els.sleepFormTemplate.content.cloneNode(true);var card=fragment.querySelector('.sleep-card');card.dataset.index=String(index);fragment.querySelector('legend').textContent=(index+1)+'回目';var session=record.sessions[index]||createEmptySession();fragment.querySelectorAll('[data-field]').forEach(function(input){var field=input.dataset.field;input.value=session[field] == null ? '' : session[field];});els.sleepForms.append(fragment);}}
function buildLatencyOptions(){var select=els.sleepFormTemplate.content.querySelector('[data-field="sleepLatency"]');for(var min=0;min<=90;min+=5){var option=document.createElement('option');option.value=String(min);option.textContent=min+'分';select.append(option);}[120,150,180].forEach(function(min){var option=document.createElement('option');option.value=String(min);option.textContent=min+'分';select.append(option);});}
function saveEntryFromDialog(){var sessions=Array.prototype.slice.call(els.sleepForms.querySelectorAll('.sleep-card')).map(function(card,index){var session=createEmptySession();session.id=state.selectedDate+'-'+(index+1);card.querySelectorAll('[data-field]').forEach(function(input){session[input.dataset.field]=String(input.value).trim();});TYPE_KEYS.forEach(function(key){session[key]=clampNumber(session[key],0,100);});session.score=clampNumber(session.score,0,100);session.sleepLatency=session.sleepLatency===''?'':clampNumber(session.sleepLatency,0,999);session.durationMinutes=parseDuration(session.duration);return session;});state.data.records[state.selectedDate]={date:state.selectedDate,secondEnabled:els.secondMode.value==='on',sessions:sessions};state.data.meta.updatedAt=new Date().toISOString();saveData();closeDialog();renderAll();}
function deleteSelectedDay(){delete state.data.records[state.selectedDate];state.data.meta.updatedAt=new Date().toISOString();saveData();closeDialog();renderAll();}
function closeDialog(){if(typeof els.entryDialog.close==='function')els.entryDialog.close();else els.entryDialog.removeAttribute('open');}
function renderHistory(){var query=els.historySearch.value.trim().toLowerCase();var records=Object.values(state.data.records).map(normalizeRecord).filter(function(record){return record.sessions.some(hasUsefulInput);}).sort(function(a,b){return b.date.localeCompare(a.date);}).filter(function(record){var text=(record.date+' '+record.sessions.map(function(s){return s.memo;}).join(' ')).toLowerCase();return !query||text.indexOf(query)>=0;});els.historyList.replaceChildren();if(records.length===0){els.historyList.append(emptyNode('まだ履歴がありません。カレンダーから入力できます。'));return;}records.forEach(function(record){var item=document.createElement('article');item.className='history-item';var sessions=record.sessions.filter(hasUsefulInput);item.innerHTML='<div><strong>'+formatDateLabel(record.date)+'</strong><span class="history-meta">'+(record.secondEnabled?'分割睡眠':'一括睡眠')+'</span></div><div>'+sessions.map(sessionSummary).join('<br>')+'</div>';var edit=document.createElement('button');edit.type='button';edit.textContent='編集';edit.addEventListener('click',openEntryDialog.bind(null,record.date));item.append(edit);els.historyList.append(item);});}
function renderAnalysis(){var sessions=flattenSessions();var results=runAllModels(sessions).filter(function(r){return r.total>0;}).sort(function(a,b){return b.rate-a.rate;});els.analysisSummary.textContent=sessions.length?sessions.length+'件の睡眠データを解析中。基準データが不足する行は一致率計算から除外します。':'データを入力すると、ここにモデルごとの一致率が表示されます。';els.modelScoreGrid.replaceChildren();if(!results.length)els.modelScoreGrid.append(emptyNode('一致率を計算できるデータがまだありません。'));else results.slice(0,12).forEach(function(r){els.modelScoreGrid.append(scoreCard(r.label,Math.round(r.rate)+'%',r.matches+'/'+r.total+'件一致',r.rate));});renderPredictionTable(sessions,results.slice(0,6));}
function renderPredictionTable(sessions,models){if(!sessions.length||!models.length){els.predictionTable.innerHTML='<div class="empty">予測比較に必要なデータがありません。</div>';return;}var head=models.map(function(m){return '<th>'+m.label+'</th>';}).join('');var rows=sessions.slice().reverse().map(function(session){var predictions=models.map(function(model){var detail=model.predictions.get(session.key);if(!detail||!detail.predicted)return '<td>判定不可</td>';var ok=detail.predicted===session.type;return '<td><span class="'+(ok?'match':'miss')+'">'+TYPE_LABELS[detail.predicted]+'</span><br><small>'+formatDiffs(detail.diffs)+'</small></td>';}).join('');return '<tr><td>'+session.date+'<br><small>'+(session.sessionIndex+1)+'回目</small></td><td>'+(TYPE_LABELS[session.type]||'未入力')+'</td><td>'+percentText(session)+'</td>'+predictions+'</tr>';}).join('');els.predictionTable.innerHTML='<table><thead><tr><th>日付</th><th>実際</th><th>入力%</th>'+head+'</tr></thead><tbody>'+rows+'</tbody></table>';}
function renderNeutral(){var sessions=flattenSessions();var rows=sessions.map(function(session,index){return {session:session,baseline:buildBaseline(sessions,index,{window:30,weight:'simple',splitMode:'session'})};}).filter(function(row){return row.baseline;});var neutralRows=rows.filter(function(row){return row.session.type==='balanced';});els.neutralHypotheses.replaceChildren();if(!rows.length){els.neutralHypotheses.append(emptyNode('平均との差を計算できるデータがまだありません。'));}else{var stats=neutralStats(rows);els.neutralHypotheses.append(scoreCard('平均との差最大値',stats.maxDiff,'30日単純平均。小さいほど、とくちょうなし候補',100-stats.maxDiffNumber),scoreCard('1位と2位との差',stats.topGap,'平均との差が近い時に発生するか観察',100-stats.topGapNumber),scoreCard('平均との差合計',stats.sumDiff,'3タイプ差分の合計',100-stats.sumDiffNumber),scoreCard('睡眠時間',stats.duration,'とくちょうなし発生時の平均',50),scoreCard('睡眠スコア',stats.score,'とくちょうなし発生時の平均',50),scoreCard('分割睡眠率',stats.splitRate,'分割睡眠との関係',stats.splitRateNumber));}if(!neutralRows.length){els.neutralTable.innerHTML='<div class="empty">とくちょうなしの記録がまだありません。</div>';return;}els.neutralTable.innerHTML='<table><thead><tr><th>日付</th><th>入力%</th><th>平均との差</th><th>最大差</th><th>1位2位差</th><th>睡眠</th></tr></thead><tbody>'+neutralRows.map(function(row){var s=row.session;var diffs=diffFromBaseline(s,row.baseline);var values=TYPE_KEYS.map(function(k){return Math.abs(diffs[k]);}).sort(function(a,b){return b-a;});return '<tr><td>'+s.date+'<br><small>'+(s.sessionIndex+1)+'回目</small></td><td>'+percentText(s)+'</td><td>'+formatDiffs(diffs)+'</td><td>'+values[0].toFixed(1)+'pt</td><td>'+(values[0]-values[1]).toFixed(1)+'pt</td><td>'+formatMinutes(s.durationMinutes)+' / '+(s.score||'-')+'点</td></tr>';}).join('')+'</tbody></table>';}
function renderStats(){var sessions=flattenSessions();els.statsGrid.replaceChildren();if(!sessions.length){els.statsSummary.textContent='記録を入力すると統計が表示されます。';els.statsGrid.append(emptyNode('統計対象のデータがありません。'));return;}var typeCounts=countBy(sessions,function(s){return s.type||'unknown';});var avgDuration=average(sessions.map(function(s){return s.durationMinutes;}).filter(Boolean));var avgScore=average(sessions.map(function(s){return Number(s.score);}).filter(Number.isFinite));var records=Object.values(state.data.records).map(normalizeRecord);var splitDays=records.filter(function(r){return r.secondEnabled;}).length;var totalDays=records.filter(function(r){return r.sessions.some(hasUsefulInput);}).length;var typed=sessions.filter(function(s){return s.type;}).length;els.statsSummary.textContent=sessions.length+'件、'+totalDays+'日分の記録を集計しています。';els.statsGrid.append(statCard('睡眠タイプ割合',typeRatioText(typeCounts,sessions.length)),statCard('平均睡眠時間',formatMinutes(avgDuration)),statCard('平均スコア',Number.isFinite(avgScore)?avgScore.toFixed(1)+'点':'-'),statCard('月別割合',groupedRatioText(sessions,function(s){return s.date.slice(0,7);})),statCard('曜日別割合',groupedRatioText(sessions,function(s){return ['日','月','火','水','木','金','土'][new Date(s.date+'T00:00:00').getDay()];})),statCard('時間帯別割合',groupedRatioText(sessions,function(s){return timeBucket(s.bedTime);})),statCard('分割睡眠率',Math.round(rate(splitDays,totalDays))+'%'),statCard('とくちょうなし発生率',Math.round(rate(typeCounts.balanced||0,typed))+'%'));}
function runAllModels(sessions){var models=[];MODEL_WINDOWS.forEach(function(w){WEIGHTS.forEach(function(weight){SPLITS.forEach(function(split){models.push(createAverageModel({window:w,weight:weight[0],weightLabel:weight[1],splitMode:split[0],splitLabel:split[1]}));});});});return models.map(function(model){return evaluateModel(model,sessions);});}
function createAverageModel(config){var windowLabel=config.window==='all'?'全期間':config.window+'日';return {id:'avg-'+config.window+'-'+config.weight+'-'+config.splitMode,label:windowLabel+' / '+config.weightLabel+' / '+config.splitLabel,predict:function(session,index,sessions){var baseline=buildBaseline(sessions,index,config);if(!baseline)return null;var diffs=diffFromBaseline(session,baseline);var ranked=TYPE_KEYS.map(function(key){return {key:key,diff:diffs[key]};}).sort(function(a,b){return b.diff-a.diff;});var maxAbs=Math.max.apply(null,TYPE_KEYS.map(function(key){return Math.abs(diffs[key]);}));var topGap=Math.abs(ranked[0].diff-ranked[1].diff);var predicted=(maxAbs<4||topGap<3)?'balanced':ranked[0].key;return {predicted:predicted,baseline:baseline,diffs:diffs};}};}
function evaluateModel(model,sessions){var total=0,matches=0,predictions=new Map();sessions.forEach(function(session,index){if(!session.type)return;var result=model.predict(session,index,sessions);if(!result||!result.predicted)return;total++;if(result.predicted===session.type)matches++;predictions.set(session.key,result);});return {id:model.id,label:model.label,total:total,matches:matches,rate:total?matches/total*100:0,predictions:predictions};}
function buildBaseline(sessions,index,config){var current=sessions[index];var currentDate=new Date(current.date+'T00:00:00');var candidates=sessions.slice(0,index).filter(function(session){if(!hasPercentages(session))return false;if(config.splitMode==='first'&&session.sessionIndex!==0)return false;if(config.splitMode==='second'&&session.sessionIndex!==1)return false;if(config.window==='all')return true;var days=dayDiff(new Date(session.date+'T00:00:00'),currentDate);return days>0&&days<=config.window;});if(config.splitMode==='daily')return weightedAverage(aggregateDaily(candidates),config.weight);return weightedAverage(candidates,config.weight);}
function aggregateDaily(sessions){var byDate=new Map();sessions.forEach(function(session){var day=byDate.get(session.date)||{date:session.date,durationMinutes:0,score:0,scoreCount:0,weight:0};var weight=session.durationMinutes||1;TYPE_KEYS.forEach(function(key){day[key]=(day[key]||0)+Number(session[key])*weight;});day.durationMinutes+=session.durationMinutes||0;if(Number.isFinite(Number(session.score))){day.score+=Number(session.score);day.scoreCount++;}day.weight+=weight;byDate.set(session.date,day);});return Array.from(byDate.values()).map(function(day){TYPE_KEYS.forEach(function(key){day[key]=day.weight?day[key]/day.weight:0;});day.score=day.scoreCount?day.score/day.scoreCount:'';return day;});}
function weightedAverage(sessions,method){if(!sessions.length)return null;var totals={dozing:0,snoozing:0,slumbering:0},weightTotal=0;sessions.forEach(function(session,index){var weight=1;if(method==='duration')weight=session.durationMinutes||1;if(method==='score')weight=Number(session.score)||1;if(method==='recency')weight=index+1;TYPE_KEYS.forEach(function(key){totals[key]+=Number(session[key])*weight;});weightTotal+=weight;});if(!weightTotal)return null;TYPE_KEYS.forEach(function(key){totals[key]/=weightTotal;});return totals;}
function diffFromBaseline(session,baseline){var out={};TYPE_KEYS.forEach(function(key){out[key]=Number(session[key])-baseline[key];});return out;}
function flattenSessions(){return Object.values(state.data.records).map(normalizeRecord).sort(function(a,b){return a.date.localeCompare(b.date);}).flatMap(function(record){return record.sessions.map(function(session,index){var copy=Object.assign({},session,{date:record.date,secondEnabled:record.secondEnabled,sessionIndex:index,key:record.date+'-'+(index+1),durationMinutes:session.durationMinutes||parseDuration(session.duration)});return copy;});}).filter(hasUsefulInput);}
function neutralStats(rows){var neutral=rows.filter(function(row){return row.session.type==='balanced';});var source=neutral.length?neutral:rows;var metrics=source.map(function(row){var diffs=diffFromBaseline(row.session,row.baseline);var abs=TYPE_KEYS.map(function(key){return Math.abs(diffs[key]);}).sort(function(a,b){return b-a;});return {max:abs[0],gap:abs[0]-abs[1],sum:abs.reduce(function(t,v){return t+v;},0),duration:row.session.durationMinutes,score:Number(row.session.score),split:row.session.secondEnabled?1:0};});var max=average(metrics.map(function(i){return i.max;}));var gap=average(metrics.map(function(i){return i.gap;}));var sum=average(metrics.map(function(i){return i.sum;}));var duration=average(metrics.map(function(i){return i.duration;}).filter(Boolean));var score=average(metrics.map(function(i){return i.score;}).filter(Number.isFinite));var split=average(metrics.map(function(i){return i.split;}))*100;return {maxDiff:max.toFixed(1)+'pt',maxDiffNumber:max,topGap:gap.toFixed(1)+'pt',topGapNumber:gap,sumDiff:sum.toFixed(1)+'pt',sumDiffNumber:sum,duration:formatMinutes(duration),score:Number.isFinite(score)?score.toFixed(1)+'点':'-',splitRate:Math.round(split)+'%',splitRateNumber:split};}
function createEmptyRecord(){return {date:state.selectedDate,secondEnabled:false,sessions:[createEmptySession(),createEmptySession()]};}
function createEmptySession(){return {id:'',type:'',dozing:'',snoozing:'',slumbering:'',duration:'',durationMinutes:0,score:'',sleepLatency:'',bedTime:'',wakeTime:'',memo:''};}
function normalizeRecord(record){var n={date:record.date,secondEnabled:Boolean(record.secondEnabled),sessions:[createEmptySession(),createEmptySession()]};(record.sessions||[]).slice(0,2).forEach(function(session,index){n.sessions[index]=Object.assign(createEmptySession(),session);});return n;}
function loadData(){try{var raw=localStorage.getItem(STORAGE_KEY);if(!raw)return defaultData();var parsed=JSON.parse(raw);return {meta:Object.assign(defaultData().meta,parsed.meta||{}),records:parsed.records||{}};}catch(e){return defaultData();}}
function defaultData(){return {meta:{app:'pokemon-sleep-type-lab',version:1,updatedAt:new Date().toISOString()},records:{}};}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data));}
function downloadBackup(){var blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='pokemon-sleep-type-lab-'+toDateKey(new Date())+'.json';a.click();URL.revokeObjectURL(url);}
function restoreBackup(event){var file=event.target.files[0];if(!file)return;var reader=new FileReader();reader.addEventListener('load',function(){try{var parsed=JSON.parse(String(reader.result));if(!parsed||typeof parsed!=='object'||!parsed.records){window.alert('復元できるJSON形式ではありません。');return;}state.data={meta:Object.assign(defaultData().meta,parsed.meta||{},{updatedAt:new Date().toISOString()}),records:parsed.records};saveData();renderAll();}catch(e){window.alert('JSONの読み込みに失敗しました。');}finally{event.target.value='';}});reader.readAsText(file);}
function changeMonth(delta){state.currentMonth=new Date(state.currentMonth.getFullYear(),state.currentMonth.getMonth()+delta,1);renderCalendar();}
function getDaySessions(dateKey){var record=state.data.records[dateKey];if(!record)return [];var n=normalizeRecord(record);return n.sessions.filter(function(s,index){return index===0||n.secondEnabled;}).filter(hasUsefulInput);}
function hasUsefulInput(session){return Boolean(session.type||session.memo||hasPercentages(session)||session.duration||session.score||session.bedTime||session.wakeTime);}
function hasPercentages(session){return TYPE_KEYS.every(function(key){return session[key]!==''&&session[key]!=null&&Number.isFinite(Number(session[key]));});}
function sessionSummary(session){var type=session.type?TYPE_LABELS[session.type]:'未判定';return '<strong>'+type+'</strong><span class="history-meta">'+percentText(session)+' / '+formatMinutes(session.durationMinutes||parseDuration(session.duration))+' / '+(session.score||'-')+'点</span>';}
function scoreCard(title,value,note,progress){var card=document.createElement('article');card.className='score-card';card.innerHTML='<span>'+title+'</span><strong>'+value+'</strong><small>'+note+'</small><div class="bar"><span style="width:'+Math.max(0,Math.min(100,progress||0))+'%"></span></div>';return card;}
function statCard(title,value){var card=document.createElement('article');card.className='stat-card';card.innerHTML='<span>'+title+'</span><strong>'+value+'</strong>';return card;}
function emptyNode(text){var div=document.createElement('div');div.className='empty';div.textContent=text;return div;}
function percentText(session){return 'う '+valueOrDash(session.dozing)+' / す '+valueOrDash(session.snoozing)+' / ぐ '+valueOrDash(session.slumbering);}
function formatDiffs(diffs){return TYPE_KEYS.map(function(key){return TYPE_LABELS[key].slice(0,2)+' '+signed(diffs[key]);}).join(' / ');}
function typeRatioText(counts,total){return ['dozing','snoozing','slumbering','balanced'].map(function(key){return TYPE_LABELS[key]+' '+Math.round(rate(counts[key]||0,total))+'%';}).join(' / ');}
function groupedRatioText(sessions,grouper){var groups=new Map();sessions.filter(function(s){return s.type;}).forEach(function(s){var key=grouper(s);var group=groups.get(key)||{total:0,balanced:0};group.total++;if(s.type==='balanced')group.balanced++;groups.set(key,group);});return Array.from(groups.entries()).slice(-6).map(function(pair){return pair[0]+': 特なし'+Math.round(rate(pair[1].balanced,pair[1].total))+'%';}).join(' / ')||'-';}
function timeBucket(time){if(!time)return '未入力';var hour=Number(time.split(':')[0]);if(hour>=18&&hour<22)return '18-22時';if(hour>=22||hour<2)return '22-2時';if(hour>=2&&hour<6)return '2-6時';return '6-18時';}
function countBy(items,fn){return items.reduce(function(memo,item){var key=fn(item);memo[key]=(memo[key]||0)+1;return memo;},{});}
function average(values){var nums=values.map(Number).filter(Number.isFinite);if(!nums.length)return NaN;return nums.reduce(function(sum,value){return sum+value;},0)/nums.length;}
function rate(part,total){return total?part/total*100:0;}
function valueOrDash(value){return value===''||value==null?'-':value+'%';}
function signed(value){var num=Number(value);if(!Number.isFinite(num))return '-';return (num>=0?'+':'')+num.toFixed(1);}
function clampNumber(value,min,max){if(value==='')return '';var num=Number(value);if(!Number.isFinite(num))return '';return Math.max(min,Math.min(max,num));}
function parseDuration(value){if(!value)return 0;var parts=value.split(':').map(Number);if(!Number.isFinite(parts[0])||!Number.isFinite(parts[1]))return 0;return parts[0]*60+parts[1];}
function formatMinutes(value){var total=Math.round(Number(value));if(!Number.isFinite(total)||total<=0)return '-';var hours=Math.floor(total/60);var minutes=total%60;return hours+'時間'+String(minutes).padStart(2,'0')+'分';}
function startOfMonth(date){return new Date(date.getFullYear(),date.getMonth(),1);}
function addDays(date,days){var result=new Date(date);result.setDate(result.getDate()+days);return result;}
function dayDiff(a,b){return Math.round((b-a)/(24*60*60*1000));}
function toDateKey(date){return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');}
function formatDateLabel(dateKey){var date=new Date(dateKey+'T00:00:00');var weekday=['日','月','火','水','木','金','土'][date.getDay()];return date.getFullYear()+'年'+(date.getMonth()+1)+'月'+date.getDate()+'日（'+weekday+'）';}
})();
